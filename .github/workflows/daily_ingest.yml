name: Daily Amazon Data Ingest

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC = 1PM Vietnam time
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest category rankings
        run: python scripts/ingest_category.py

      - name: Ingest watchlist snapshots
        run: python scripts/ingest_watchlist.py

      - name: Run analytics pipeline
        run: python scripts/run_analytics.py

      - name: Notify on failure
        if: failure()
        run: echo "Pipeline failed on $(date). Check logs."

  reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Chay thu 2 hang tuan de cap nhat reviews moi
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 6 * * 1')

    env:
      APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect reviews
        run: python scripts/ingest_reviews.py

      - name: Run sentiment analysis
        run: python scripts/analyze_sentiment.py
